<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>护理记录单入口 — 重钢总医院重症医学科</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",Arial,sans-serif;margin:0;padding:24px 16px;background:#f0f2f5;color:#111;line-height:1.6}
.container{max-width:1120px;margin:0 auto}
h1{text-align:center;font-size:24px;margin:0 0 28px;color:#1a1a1a}
h2{font-size:18px;margin:28px 0 12px;padding-left:10px;border-left:3px solid #1890ff;color:#333}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:24px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:640px;font-size:14px}
th,td{padding:11px 14px;text-align:left;border-bottom:1px solid #f0f0f0}
th{background:#fafbfc;font-weight:600;color:#555;white-space:nowrap;font-size:13px}
tr:last-child td{border-bottom:0}
tr:hover td{background:#f8fafe}
a{color:#1890ff;text-decoration:none;font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:13px}
a:hover{text-decoration:underline}
a:focus-visible{outline:2px solid #2783de;outline-offset:2px;border-radius:2px}
.data-tag{display:inline-block;padding:2px 10px;margin:1px 4px 1px 0;border-radius:12px;background:#e6f7e9;color:#2d6a3b;font-size:12px;line-height:1.6;white-space:nowrap}
.data-tag--empty{background:transparent;color:transparent}
.path-col{white-space:nowrap}
.name-col{white-space:nowrap}
.data-col{min-width:140px}
@media(max-width:700px){
  body{padding:12px 8px}
  h1{font-size:20px}
  th,td{padding:9px 10px;font-size:13px}
  .data-tag{font-size:11px;padding:1px 8px}
}
</style>
</head>
<body>
<div class="container">
<h1>重钢总医院重症医学科<br>护理记录单入口</h1>

<h2>护理与评估表单</h2>
<div class="card"><div class="table-wrap"><table>
<thead><tr><th>表单名称</th><th>访问路径</th><th>保存数据</th></tr></thead>
<tbody id="nursing-tbody"></tbody>
</table></div></div>

</div>

<script>
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderTags(sources) {
  if (!Array.isArray(sources) || !sources.length) return '';
  return sources.map(function(n){ return '<span class="data-tag">'+esc(n)+'</span>'; }).join('');
}

var nursingForms = [
  {name:'深静脉维护记录单（一）',path:'/form/sjm1',data:['TubeExe','Sjm1VeinExtra']},
  {name:'深静脉维护记录单（三）·透析导管',path:'/form/sjmCrrt',data:['TubeExe','Sjm1VeinExtra']},
  {name:'亚低温治疗体温记录单',path:'/form/ydwzlForm',data:['Bedside','YdwzlFormExtra']},
  {name:'肠内营养耐受性评分表',path:'/form/toleranceForm',data:['Score']},
  {name:'自杀风险评估表（NGASR）',path:'/form/commitSuicideForm',data:['Score']},
  {name:'失禁相关性皮炎（IAD）评估记录单',path:'/form/IADForm',data:['Score']},
  {name:'住院患者日常生活能力评估单（Barthel）',path:'/form/baetheiForm',data:['Score','SelfCareFormExtra']},
  {name:'跌倒/坠床风险评估及预防措施记录单',path:'/form/patientFallDangerForm',data:['Score','FallDangerFormExtra']},
  {name:'健康教育记录单',path:'/form/jkjyForm',data:['HealthEducationRecord']},
  {name:'住院患者物品管理表',path:'/form/wpgmForm',data:[]},
  {name:'ECMO 运行护理记录单',path:'/form/ecmoForm',data:['Bedside','EcmoRecordExtra']},
  {name:'输血记录单',path:'/form/transfusionForm',data:['TransfusionRecord']},
  {name:'PICCO 容量监测参数记录表',path:'/form/piccoForm',data:['Bedside','PiccoRecordExtra']},
  {name:'IABP 运行护理记录单',path:'/form/iabpForm',data:['Bedside','IabpRecordExtra']}
];

function renderRows(containerId, list) {
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var item = list[i];
    html += '<tr><td class="name-col">'+esc(item.name)+'</td><td class="path-col"><a href="'+esc(item.path)+'">'+esc(item.path)+'</a></td><td class="data-col">'+renderTags(item.data)+'</td></tr>';
  }
  document.getElementById(containerId).innerHTML = html;
}

renderRows('nursing-tbody', nursingForms);
</script>
</body>
</html>
