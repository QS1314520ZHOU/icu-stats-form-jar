<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <title>Sjm1App</title>
  <base href="/form/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function () {
      window.__scMsg = window.__scMsg || null;
      function isHostMsg(d){ return d && d.type === 'SmartCare' && d.patient && d.patient.id; }
      window.addEventListener('message', function (e) {
        var d = e && e.data;
        if (isHostMsg(d)) {
          window.__scMsg = d;
          try { console.log('[form inline] cached host msg', d); } catch (_) {}
        }
      });
      // 宿主靠 onload 重发：iframe 一 load 就主动告知 parent 我已就绪
      try { window.parent && window.parent.postMessage({ type: 'SmartCareReady' }, '*'); } catch (_) {}
      window.addEventListener('load', function () {
        try { window.parent && window.parent.postMessage({ type: 'SmartCareReady' }, '*'); } catch (_) {}
      });
    })();
  </script>
