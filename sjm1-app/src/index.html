<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sjm1App</title>
  <base href="/form/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // 启动前就接住宿主消息，缓存最后一条
    window.__scMsg = null;
    window.addEventListener('message', function (e) {
      var d = e && e.data;
      if (d && d.type === 'SmartCare' && d.patient) { window.__scMsg = d; }
    });
    // 告诉宿主：iframe 已就绪，请把当前病人发过来（补发握手）
    function __scReady() { try { parent.postMessage({ type: 'SmartCareReady' }, '*'); } catch (e) {} }
    __scReady();
    window.addEventListener('load', __scReady);
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
