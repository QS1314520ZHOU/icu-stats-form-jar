<!doctype html>
<html lang="en">
<head>

  <title>Sjm1App</title>
  <base href="/form/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // 早期监听：缓存 Angular 启动前到达的 SmartCare 消息
    window.__lastSmartCareMsg = null;
    window.addEventListener('message', function(e) {
      if (e?.data && e.data.type === 'SmartCare') {
        window.__lastSmartCareMsg = e.data;
      }
    });
  </script>
</head>

</body>
