<nz-layout class="app-layout">
  <nz-header>
    <div class="app-header">
      <div class="app-header-left">
        <button nz-button nzType="default" (click)="dispatchToolbarAction('history')">
          <i nz-icon nzType="history"></i>历史记录
        </button>
        <button nz-button nzType="primary" (click)="dispatchToolbarAction('add')">
          <i nz-icon nzType="plus"></i>添加记录
        </button>
      </div>
      <div class="app-header-toolbar">
        <button nz-button nzType="default" (click)="dispatchToolbarAction('help')">
          <i nz-icon nzType="question-circle"></i>规范与帮助
        </button>
        <button nz-button nzType="default" (click)="printCurrentPage()">
          <i nz-icon nzType="printer"></i>打印
        </button>
      </div>
    </div>
  </nz-header>
  <nz-content>
    <div class="inner-content">
      <router-outlet></router-outlet>
    </div>
  </nz-content>
</nz-layout>
